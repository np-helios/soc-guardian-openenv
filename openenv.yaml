name: soc-guardian-openenv
version: 0.1.0
entrypoint: server.app:app
description: >
  An OpenEnv-style benchmark for SOC incident triage and early breach detection
  under compute and latency constraints.
tasks:
  - helpdesk_takeover
  - privilege_spiral
  - lateral_breach
action_model: SocAction
observation_model: SocObservation
state_model: SocState
metadata:
  domain: security-operations
  novelty: cost-aware-soc-routing
  reward_range: "-2.0 to 2.0"
